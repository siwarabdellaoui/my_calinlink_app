name: calinlink
description: Baby monitoring app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^12.1.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  permission_handler: ^11.1.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/ 